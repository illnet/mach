name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TOOLCHAIN: nightly-2026-02-06

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      stable: ${{ steps.flag.outputs.stable }}
      docker_needed: ${{ steps.flag.outputs.docker_needed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute workflow metadata
        id: flag
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "stable=false" >> $GITHUB_OUTPUT
          else
            MSG="$(git log -1 --pretty=%B)"
            if printf '%s' "$MSG" | grep -Fq '[stable]'; then
              echo "stable=true" >> $GITHUB_OUTPUT
            else
              echo "stable=false" >> $GITHUB_OUTPUT
            fi
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA="${{ github.sha }}^"
            HEAD_SHA="${{ github.sha }}"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || git show --pretty='' --name-only "${{ github.sha }}" || true)"
          if echo "$CHANGED_FILES" | grep -qE '^(src/|net/|Cargo\.toml|Cargo\.lock|\.github/workflows/|Dockerfile\.copy)'; then
            echo "docker_needed=true" >> $GITHUB_OUTPUT
          else
            echo "docker_needed=false" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: meta
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: target-default
      TARGET: x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools pkg-config
          sudo rm -rf /var/lib/apt/lists/*

      - name: Cache cargo (default)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ${{ env.CARGO_TARGET_DIR }}
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}-${{ env.TOOLCHAIN }}-default
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}-${{ env.TOOLCHAIN }}-

      - name: Install nightly toolchain
        run: |
          rustup toolchain install ${{ env.TOOLCHAIN }} --profile minimal --component clippy --component rustfmt

      - name: Add musl target
        run: rustup target add ${{ env.TARGET }} --toolchain ${{ env.TOOLCHAIN }}

      - name: Build (default)
        run: cargo +${{ env.TOOLCHAIN }} build --release --target ${{ env.TARGET }} --verbose

      - name: Build tun agent (default)
        run: cargo +${{ env.TOOLCHAIN }} build -p tun --bin minitun --release --target ${{ env.TARGET }} --verbose

      - name: Test
        run: cargo +${{ env.TOOLCHAIN }} test --release --target ${{ env.TARGET }} --verbose

      - name: Prepare default artifact
        run: |
          mkdir -p artifacts/linux/default
          cp ${{ env.CARGO_TARGET_DIR }}/${{ env.TARGET }}/release/lure artifacts/linux/default/lure
          cp ${{ env.CARGO_TARGET_DIR }}/${{ env.TARGET }}/release/minitun artifacts/linux/default/minitun
          chmod +x artifacts/linux/default/lure artifacts/linux/default/minitun
          sha256sum artifacts/linux/default/lure | tee artifacts/linux/default/lure.sha256
          sha256sum artifacts/linux/default/minitun | tee artifacts/linux/default/minitun.sha256

      - name: Upload default artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: artifacts/linux/default
          if-no-files-found: error
          overwrite: true

  stable_build:
    runs-on: ubuntu-latest
    needs: meta
    if: needs.meta.outputs.stable == 'true'
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: target-stable
      TARGET: x86_64-unknown-linux-musl
      RUSTFLAGS: "-Zdylib-lto -C opt-level=3 -C lto=fat -C codegen-units=8 --cfg tokio_unstable -C embed-bitcode=yes -C panic=abort -C incremental=no -C target-cpu=x86-64-v3"
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools pkg-config
          sudo rm -rf /var/lib/apt/lists/*

      - name: Cache cargo (stable)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ${{ env.CARGO_TARGET_DIR }}
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}-${{ env.TOOLCHAIN }}-stable
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}-${{ env.TOOLCHAIN }}-

      - name: Install nightly toolchain
        run: |
          rustup toolchain install ${{ env.TOOLCHAIN }} --profile minimal --component clippy --component rustfmt

      - name: Add musl target
        run: rustup target add ${{ env.TARGET }} --toolchain ${{ env.TOOLCHAIN }}

      - name: Build [stable] variant
        run: |
          cargo +${{ env.TOOLCHAIN }} build --release --target ${{ env.TARGET }} --verbose
          cargo +${{ env.TOOLCHAIN }} build -p tun --bin minitun --release --target ${{ env.TARGET }} --verbose
          mkdir -p artifacts/linux/stable
          cp ${{ env.CARGO_TARGET_DIR }}/${{ env.TARGET }}/release/lure artifacts/linux/stable/lure
          chmod +x artifacts/linux/stable/lure
          sha256sum artifacts/linux/stable/lure | tee artifacts/linux/stable/lure.sha256
          cp ${{ env.CARGO_TARGET_DIR }}/${{ env.TARGET }}/release/minitun artifacts/linux/stable/minitun
          chmod +x artifacts/linux/stable/minitun
          sha256sum artifacts/linux/stable/minitun | tee artifacts/linux/stable/minitun.sha256

      - name: Upload [stable] artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-stable
          path: artifacts/linux/stable
          if-no-files-found: error
          overwrite: true
          
  docker_release:
    runs-on: ubuntu-latest
    needs: [meta, build]
    if: github.ref == 'refs/heads/main' && needs.meta.outputs.docker_needed == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: artifacts/linux/default
      - name: Stage Docker payload
        run: cp artifacts/linux/default/lure ./lure
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.1.1"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push (default)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.copy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker_release_stable:
    runs-on: ubuntu-latest
    needs: [meta, stable_build]
    if: github.ref == 'refs/heads/main' && needs.stable_build.result == 'success'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Download [stable] artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-release-stable
          path: artifacts/linux/stable
      - name: Stage Docker payload
        run: cp artifacts/linux/stable/lure ./lure
          
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.1.1"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=stable
            type=sha,format=long,prefix=stable-

      - name: Build and push ([stable])
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.copy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
