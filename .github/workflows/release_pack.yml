name: Release Pack

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install OS deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zip
          sudo rm -rf /var/lib/apt/lists/*

      - name: Setup zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Setup Rust (pinned)
        run: |
          rustup toolchain install nightly-2026-02-06 --profile minimal --component clippy --component rustfmt
          rustup default nightly-2026-02-06

      - name: Cache cargo + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target-releasepack/
          key: ${{ runner.os }}-releasepack-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'net/Cargo.toml', 'tun/Cargo.toml', 'scripts/release_pack.sh', 'rust-toolchain.toml') }}

      - name: Build packs
        run: |
          ./scripts/release_pack.sh

      - name: Upload flat bins (for GHA)
        uses: actions/upload-artifact@v4
        with:
          name: gha-bins
          path: dist/gha/**
          if-no-files-found: error
          overwrite: true

      - name: Upload archives
        uses: actions/upload-artifact@v4
        with:
          name: archives
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
          if-no-files-found: error
          overwrite: true

      - name: Create GitHub release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
