name: Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  TOOLCHAIN: nightly-2026-02-06

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        run: |
          rustup toolchain install ${{ env.TOOLCHAIN }} --profile minimal --component clippy --component rustfmt
          rustup default ${{ env.TOOLCHAIN }}

      - name: Build (release)
        run: |
          cargo +${{ env.TOOLCHAIN }} build -p lure --bin lure --release --verbose
          cargo +${{ env.TOOLCHAIN }} build -p tun --bin minitun --release --verbose

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows/default | Out-Null
          Copy-Item -Force target/release/lure.exe artifacts/windows/default/lure.exe
          Copy-Item -Force target/release/minitun.exe artifacts/windows/default/minitun.exe
          (Get-FileHash -Algorithm SHA256 artifacts/windows/default/lure.exe).Hash + "  lure.exe" | Out-File -Encoding ascii artifacts/windows/default/lure.exe.sha256
          (Get-FileHash -Algorithm SHA256 artifacts/windows/default/minitun.exe).Hash + "  minitun.exe" | Out-File -Encoding ascii artifacts/windows/default/minitun.exe.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: artifacts/windows/default
          if-no-files-found: error
          overwrite: true
